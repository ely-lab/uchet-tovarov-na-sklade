<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Учёт товаров на складе</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- 🔐 LOGIN SCREEN -->
<section id="login-screen" class="login-screen">
  <form id="login-form" class="login-card">
    <h1>Вход в систему</h1>

    <input id="login-username" placeholder="Логин" required />
    <input id="login-password" type="password" placeholder="Пароль" required />

    <button type="submit" class="primary">Войти</button>

    <p id="login-message" class="message"></p>
  </form>
</section>

<!-- 📦 APP -->
<div id="app" class="hidden">

<header class="site-header">
  <div>
    <p class="eyebrow">Учёт товаров на складе</p>
    <h1>Склад</h1>
  </div>

  <div class="header-actions">
    <button class="secondary hidden" id="btn-back-menu">Назад</button>
    <button class="secondary hidden" id="btn-logout">Выйти</button>
    <button class="secondary hidden" id="btn-add-item">Добавить товар</button>
    <button class="secondary hidden" id="btn-inventory">Инвентаризация</button>
    <button class="secondary hidden" id="btn-transfer">Перемещение</button>
  </div>
</header>

<main class="page-content">
<section id="module-menu" class="controls hidden">
  <button class="primary" id="btn-module-warehouse">Склад</button>
  <button class="primary" id="btn-module-returns">Возвраты</button>
  <button class="primary" id="btn-module-registries">Реестры</button>
</section>

<section id="warehouse-section" class="hidden">
<div class="controls">
  <input id="search" type="search" placeholder="Поиск товара или штрихкода..." />

  <select id="filter-brand">
    <option value="all">Все бренды</option>
    <option>Ferrero</option>
    <option>HEINZ</option>
    <option>Perfetti Van Melle</option>
    <option>Tchibo</option>
    <option>Selpak</option>
    <option>Hochland</option>
    <option>Chupa Chups</option>
    <option>Bonduelle</option>
    <option>Globus</option>
    <option>Global White</option>
    <option>Lacalut</option>
    <option>Loli</option>
    <option>Pine</option>
    <option>Peros</option>
    <option>Storck</option>
    <option>Vernet</option>
    <option>ЕЖК</option>
    <option>Кампина</option>
    <option>Конфитрейд</option>
    <option>Объединённые кондитеры</option>
    <option>Раменский</option>
    <option>РусАгро</option>
    <option>Савана</option>
    <option>Эвиап</option>
    <option>Эрманн</option>
  </select>

  <div class="summary" id="summary"></div>
</div>

<section id="inventory" class="inventory-grid"></section>
</section>

<section id="returns-section" class="hidden">
  <div class="return-layout">

    <!-- 📄 Список накладных -->
    <div class="return-panel">
      <h2>Возвраты по накладным 1С</h2>
      <p class="muted">
        Выберите накладную и укажите количество товара для возврата.
      </p>

      <div id="invoice-list" class="invoice-list"></div>
    </div>

    <!-- 📋 Детали накладной -->
    <div class="return-panel">
      <h2>Состав накладной</h2>

      <div id="invoice-details">
        <p class="muted">Накладная не выбрана</p>
      </div>
    </div>

  </div>
</section>

<section id="registries-section" class="controls hidden">
  <h3>Реестры погрузочных листов (1С)</h3>
  <div id="registry-list"></div>
</section>

<!-- ➕ ADD MODAL -->
<section id="add-section" class="modal hidden">
  <div class="modal-card">

    <button type="button" class="close-button" id="closeModal">×</button>

    <h2>Добавить товар</h2>

    <form id="item-form" class="item-form">

      <input id="item-name" placeholder="Название" required />
      <input id="item-barcode" placeholder="Штрихкод" required />

      <select id="item-brand" required>
        <option>Ferrero</option>
        <option>HEINZ</option>
        <option>Perfetti Van Melle</option>
        <option>Tchibo</option> 
        <option>Selpak</option>
        <option>Hochland</option>
        <option>Chupa Chups</option>
        <option>Bonduelle</option>
        <option>Globus</option>
        <option>Global White</option>
        <option>Lacalut</option>
        <option>Loli</option>
        <option>Pine</option>
        <option>Peros</option>
        <option>Storck</option>
        <option>Vernet</option>
        <option>ЕЖК</option>
        <option>Кампина</option>
        <option>Конфитрейд</option>
        <option>Объединённые кондитеры</option>
        <option>Раменский</option>
        <option>РусАгро</option>
        <option>Савана</option>
        <option>Эвиап</option>
        <option>Эрманн</option>
      </select>

      <input id="item-quantity" type="number" placeholder="Количество" required />

      <select id="item-unit" required>
        <option value="шт">шт</option>
        <option value="кг">кг</option>
      </select>

      <button type="submit" class="primary">Сохранить</button>

    </form>

  </div>
</section>

</main>

<footer class="site-footer">
  <p>Складская система</p>
</footer>

</div>

<script src="script.js"></script>
</body>
</html>
