<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Учёт товаров на складе</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div>
      <p class="eyebrow">Учёт товаров на складе</p>
      <h1>Инвентаризация склада</h1>
    </div>

    <div class="header-actions">
      <button class="secondary" id="btn-login">Войти</button>
      <button class="secondary hidden" id="btn-logout">Выйти</button>
      <button class="primary hidden" id="btn-add-item">Добавить товар</button>
      <button class="primary hidden" id="btn-import-items">Массовый импорт</button>
    </div>
  </header>

  <main class="page-content">

    <section class="controls">
      <input id="search" type="search" placeholder="Поиск товара или штрихкода..." />

      <select id="filter-brand">
        <option value="all">Все бренды</option>
        <option>Bonduelle</option>
        <option>Chupa Chups</option>
        <option>Ferrero</option>
        <option>GLOBUS</option>
        <option>GLOBAL WHITE</option>
        <option>HEINZ</option>
        <option>Hochland</option>
        <option>Lacalut</option>
        <option>LOLI</option>
        <option>PINE</option>
        <option>PEROS</option>
        <option>Perfetti Van Melle</option>
        <option>SELPAK</option>
        <option>Storck</option>
        <option>Tchibo</option>
        <option>VERNET</option>
        <option>ЕЖК</option>
        <option>Кампина</option>
        <option>Конфитрейд</option>
        <option>Объединённые кондитеры</option>
        <option>Раменский</option>
        <option>РусАгро</option>
        <option>САВАНА</option>
        <option>Эвиап</option>
        <option>Эрманн</option>
      </select>

      <div class="summary" id="summary"></div>
    </section>

    <section id="inventory" class="inventory-grid"></section>

    <section id="add-section" class="modal hidden">
      <div class="modal-card">
        <button type="button" class="close-button" id="closeModal">×</button>

        <h2 id="modal-title">Добавить товар</h2>

        <form id="item-form" class="item-form">
          <label>
            Название
            <input id="item-name" required />
          </label>

          <label>
            Штрихкод
            <input id="item-barcode" required placeholder="Введите штрихкод" />
          </label>

          <label>
            Бренд
            <select id="item-brand" required>
              <option>Bonduelle</option>
              <option>Chupa Chups</option>
              <option>Ferrero</option>
              <option>GLOBUS</option>
              <option>GLOBAL WHITE</option>
              <option>HEINZ</option>
              <option>Hochland</option>
              <option>Lacalut</option>
              <option>LOLI</option>
              <option>PINE</option>
              <option>PEROS</option>
              <option>Perfetti Van Melle</option>
              <option>SELPAK</option>
              <option>Storck</option>
              <option>Tchibo</option>
              <option>VERNET</option>
              <option>ЕЖК</option>
              <option>Кампина</option>
              <option>Конфитрейд</option>
              <option>Объединённые кондитеры</option>
              <option>Раменский</option>
              <option>РусАгро</option>
              <option>САВАНА</option>
              <option>Эвиап</option>
              <option>Эрманн</option>
            </select>
          </label>

          <label>
            Количество
            <input id="item-quantity" type="number" step="0.01" min="0" required />
          </label>

          <label>
            Ед. измерения
            <select id="item-unit" required>
              <option value="шт">шт</option>
              <option value="кг">кг</option>
            </select>
          </label>

          <button type="submit" class="primary">Сохранить товар</button>

          <p id="form-message" class="message"></p>
        </form>
      </div>
    </section>

    <section id="login-modal" class="modal hidden">
      <div class="modal-card small-modal">
        <button type="button" class="close-button" id="closeLoginModal">×</button>

        <h2>Вход администратора</h2>

        <form id="login-form" class="item-form">
          <label>
            Пароль администратора
            <input id="admin-password" type="password" required placeholder="Введите пароль" />
          </label>

          <button type="submit" class="primary">Войти</button>

          <p id="login-message" class="message"></p>
        </form>
      </div>
    </section>

    <section id="import-modal" class="modal hidden">
  <div class="modal-card">
    <button type="button" class="close-button" id="closeImportModal">×</button>

    <h2>Массовый импорт товаров</h2>

    <label class="file-upload">
  Выбрать Excel файл
  <input id="excel-file" type="file" accept=".xlsx,.xls" />
</label>

<div id="file-name" class="file-name">Файл не выбран</div>

    <textarea
      id="import-text"
      class="import-textarea"
      rows="10"
      placeholder="Сахар;1234567890123;РусАгро;5.5;кг&#10;Печенье;1111111111111;Ferrero;20;шт"
    ></textarea>

    <button type="button" class="primary import-save-btn" id="save-import">
      Добавить товары
    </button>

    <p id="import-message" class="message"></p>
  </div>
</section>

  </main>

  <footer class="site-footer">
    <p>API: GET /api/items | POST /api/items | PUT /api/items/:id</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
